<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f4f8;
    margin:0;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header{
    border-top:10px solid #673ab7;
    padding-top:20px;
}

h1{
    color:#202124;
}

p{
    color:#5f6368;
}

.form-group{
    margin:20px 0;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:8px;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #dadce0;
    border-radius:6px;
    font-size:16px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#673ab7;
}

button{
    background:#673ab7;
    color:white;
    border:none;
    padding:12px 30px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#5a2ea6;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Student Registration Form</h1>
        <p>Please fill all required details.</p>
    </div>

    <form>

        <div class="form-group">
            <label>Student Name *</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" required>
        </div>

        <div class="form-group">
            <label>Student ID *</label>
            <input type="number" required>
        </div>

        <div class="form-group">
            <label>Branch *</label>
            <select required>
                <option value="">Select Branch</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>
                <option>Civil</option>
            </select>
        </div>

        <div class="form-group">
            
            <label>Upload Photo *</label>
            <input type="file" accept="image/*" required>
        </div>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
